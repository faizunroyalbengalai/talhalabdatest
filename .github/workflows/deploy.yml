name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Lambda zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies into package/
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -t package/

      - name: Copy application source into package/
        run: |
          # Copy all app source files preserving directory structure
          cp -r app/ package/app/
          # Copy lambda entry-point to the zip root
          cp lambda_handler.py package/lambda_handler.py
          # Copy any other top-level source files needed
          if [ -f main.py ]; then cp main.py package/main.py; fi
          # Copy static assets if they exist
          if [ -d public ]; then cp -r public/ package/public/; fi

      - name: Create lambda.zip
        run: |
          cd package
          zip -r ../lambda.zip .
          cd ..
          echo "Zip size: $(du -sh lambda.zip)"

      - name: Upload zip artifact for deploy job
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: lambda.zip
          retention-days: 1

  deploy:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download lambda.zip artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-zip

      - name: Upload lambda.zip to S3
        run: |
          aws s3 cp lambda.zip \
            s3://${{ secrets.TF_STATE_BUCKET }}/${{ secrets.PROJECT_NAME }}/lambda.zip

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="tf_state_bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Get Function URL
        id: get_url
        working-directory: terraform
        run: |
          FUNCTION_URL=$(terraform output -raw function_url)
          echo "function_url=${FUNCTION_URL}" >> $GITHUB_OUTPUT
          echo "Function URL: ${FUNCTION_URL}"

      - name: Force Lambda to use latest S3 artifact
        run: |
          FUNCTION_NAME=$(cd terraform && terraform output -raw function_name)
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --s3-bucket "${{ secrets.TF_STATE_BUCKET }}" \
            --s3-key "${{ secrets.PROJECT_NAME }}/lambda.zip" \
            --region "${{ secrets.AWS_REGION }}"
          # Wait for the function to become active (handles both fresh creates and updates)
          aws lambda wait function-active \
            --function-name "$FUNCTION_NAME" \
            --region "${{ secrets.AWS_REGION }}"
          # Also wait for any in-progress update to settle
          aws lambda wait function-updated \
            --function-name "$FUNCTION_NAME" \
            --region "${{ secrets.AWS_REGION }}"

      - name: Smoke test — verify public endpoint returns 2xx/3xx
        run: |-
          FUNCTION_URL="${{ steps.get_url.outputs.function_url }}"
          echo "Smoke testing: ${FUNCTION_URL}"

          # Retry up to 10 times with 10-second intervals (Lambda cold-start)
          for i in $(seq 1 10); do
            HTTP_STATUS=$(curl -s -o /tmp/smoke_response.txt -w "%{http_code}" \
              --max-time 30 "${FUNCTION_URL}")
            echo "Attempt ${i}: HTTP ${HTTP_STATUS}"
            cat /tmp/smoke_response.txt
            if [ "${HTTP_STATUS}" -ge 200 ] && [ "${HTTP_STATUS}" -lt 400 ]; then
              echo "Smoke test PASSED (HTTP ${HTTP_STATUS})"
              exit 0
            fi
            echo "Not ready yet, waiting 10s..."
            sleep 10
          done

          echo "Smoke test FAILED — endpoint did not return 2xx/3xx after 10 attempts"
          exit 1
